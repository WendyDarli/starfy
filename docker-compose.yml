services:
  web:
    depends_on:
      - backend
    build: ./frontend
    ports:
      - "5173:5173"
    env_file: 
      - ./.env
    environment:
      - VITE_API_URL=${VITE_API_URL}
    develop:
      watch:
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/package-lock.json
          action: rebuild
        - path: ./frontend
          target: /app
          action: sync
          ignore:
            - node_modules/

  backend:
    depends_on:
      - redis
    build: ./backend
    ports:
      - "8000:8000"
    env_file: 
      - ./.env
    environment:
      - REDIS_URL=${REDIS_URL}
    develop:
      watch:
        - path: ./backend/package.json
          action: rebuild
        - path: ./backend/package-lock.json
          action: rebuild
        - path: ./backend
          target: /app
          action: sync
          ignore:
            - node_modules/

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
  
  jaeger:
    image: jaegertracing/all-in-one:latest
    command:
      - "--collector.otlp.grpc.host-port=0.0.0.0:4317"
    ports:
      - "16686:16686"
volumes:
  redis_data: