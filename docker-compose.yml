services:
  web:
    depends_on:
      - backend
    build: ./frontend
    ports:
      - "5173:5173"
    env_file: 
      - ./.env
    environment:
      - VITE_API_URL=${VITE_API_URL}
    develop:
      watch:
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/package-lock.json
          action: rebuild
        - path: ./frontend
          target: /app
          action: sync
          ignore:
            - node_modules/

  backend:
    depends_on:
      - redis
    build: ./backend
    ports:
      - "8000:8000"
    env_file: 
      - ./.env
    environment:
      - REDIS_URL=${REDIS_URL}
    develop:
      watch:
        - path: ./backend/package.json
          action: rebuild
        - path: ./backend/package-lock.json
          action: rebuild
        - path: ./backend
          target: /app
          action: sync
          ignore:
            - node_modules/

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data: